<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>FOrza streetOD</title>
  <!-- materialize icons, css & js -->
  <link type="text/css" href="/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" href="/css/styles.css" rel="stylesheet">
  <script type="text/javascript" src="/js/materialize.min.js"></script>
</head>
<body class="grey lighten-4">

  <!-- top nav -->
  <nav class="z-depth-0">
    <div class="nav-wrapper container">
      <a href="/">Venta<span>Patito</span></a>
      <span class="right grey-text text-darken-1">
        <i class="material-icons sidenav-trigger" data-target="side-menu">menu</i>
      </span>
    </div>
  </nav>

  <!-- side nav -->
  <ul id="side-menu" class="sidenav side-menu">
    <li><a class="subheader">VentaPatito</a></li>
    <li><a href="/" class="waves-effect">Home</a></li>
    <li><a href="/pages/about.html" class="waves-effect">About</a></li>
    <li><div class="divider"></div></li>
    <li><a href="/pages/contact.html" class="waves-effect">
      <i class="material-icons">mail_outline</i>Contact</a>
    </li>
  </ul>

  <!-- content -->
  <div class="container grey-text">
        <div class="input-field">
          <label for="platillo" class="active">Platillo</label>
          <select id="listaPlatillos" name="platillo" class="browser-default" style="margin-top: 15px; border: 1px solid #ccc; border-radius: 4px; padding: 5px;">
            <option value="" disabled selected>Seleccionar...</option>
          </select>
        </div>

        <div class="input-field">
          <input id="nombre" type="text" class="validate" name="nombre">
          <label for="nombre">Nombre</label>
        </div>

        <div class="input-field">
          <textarea id="direccion" class="materialize-textarea" name="direccion"></textarea>
          <label for="direccion">Dirección</label>
        </div>

        <div class="input-field center" style="margin-top: 40px;">
          <button id="btnCancelar" type="button" class="btn grey lighten-1 z-depth-0" style="margin-right: 10px;">Cancelar</button>
          <button id="btnGuardar" type="button" class="btn add-btn z-depth-0">Guardar</button>
        </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/6.0.1/firebase-app.js"></script>

  <script src="https://www.gstatic.com/firebasejs/6.0.1/firebase-firestore.js"></script>

  <script src="/js/firebase.js"></script>
  <script src="/js/pedidos.js"></script>

</body>
</html>
