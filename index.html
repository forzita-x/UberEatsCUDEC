<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Proyecto</title>
  <!-- materialize icons, css & js -->
  <link type="text/css" href="/css/materialize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link type="text/css" href="/css/styles.css" rel="stylesheet">
  <script type="text/javascript" src="/js/materialize.min.js"></script>
</head>
<body class="grey lighten-4">

  <!-- Menu superior -->
  <nav class="z-depth-0">
    <div class="nav-wrapper container">
      <a href="/">Proyecto</span></a>
      <span class="right grey-text text-darken-1">
        <i class="material-icons sidenav-trigger" data-target="side-menu">menu</i>
      </span>
    </div>
  </nav>

  <!-- Menu lateral -->
  <ul id="side-menu" class="sidenav side-menu">
    <li><a class="subheader">UberEatsCUDEC</a></li>
    <li><a href="/" class="waves-effect">Inicio</a></li>
    <li><a href="/pages/about.html" class="waves-effect">Acerca</a></li>
    <li><a href="/pages/pedidos.html" class="waves-effect">Pedidos</a></li>
    <li><div class="divider"></div></li>
    <li><a href="/pages/contact.html" class="waves-effect">
      <i class="material-icons">mail_outline</i>Contacto</a>
    </li>
  </ul>

  <!-- Lista de platillos -->
  <div class="recipes container grey-text text-darken-1">
    
  </div>

  <div class="center">
    <a class="btn-floating btn-small btn-large add-btn sidenav-trigger" data-target="side-form">
      <i class="material-icons">add</i>
    </a>
  </div>

  <!-- Agregar platillo -->
  <div id="side-form" class="sidenav side-form">
    <form class="add-recipe container section">
      <h6 >Nuevo platillo</h6>
      <div class="divider"></div>
      <div class="input-field">
        <input placeholder="ejemplo: Pizza" id="nombre" type="text" class="validate">
        <label for="title">Nombre</label>
      </div>
      <div class="input-field">
        <input placeholder="e.g. Tofu, mushroom, garlic" id="ingredientes" type="text" class="validate">
        <label for="ingredients">Ingredientes</label>
      </div>
      <div class="input-field">
        <input placeholder="ejemplo: 50.00" id="precio" type="text" class="validate">
        <label for="precio">Precio</label>
      </div>
      <div class="input-field center">
        <button class="btn-small">Agregar</button>
      </div>
    </form>
  </div>

  <script src="https://www.gstatic.com/firebasejs/6.0.1/firebase-app.js">
    </script>

  <script src="https://www.gstatic.com/firebasejs/6.0.1/firebase-firestore.js">
    </script>

  <script src="/js/pedidos.js"></script>
  <script src="/js/index.js"></script>
  <script src="/js/db.js"></script>
</body>
</html>
